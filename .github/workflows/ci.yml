name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Lint & Type Check ──
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: prism-ui/package-lock.json

      - name: Install Python dependencies
        run: pip install -e ".[dev]" ruff mypy

      - name: Install frontend dependencies
        run: cd prism-ui && npm ci

      - name: Ruff check
        run: ruff check prism/ tests/

      - name: Mypy
        run: mypy prism/ --ignore-missing-imports

      - name: TypeScript check
        run: cd prism-ui && npx tsc --noEmit

      - name: ESLint
        run: cd prism-ui && npx eslint src/

  # ── Stage 2: Unit Tests ──
  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Python unit tests
        run: pytest -m unit --timeout=30 --tb=short --junitxml=test-results/pytest-unit.xml

      - name: Run hardening + FR coverage tests
        run: pytest tests/test_api_hardening.py tests/test_fr_coverage.py -v --tb=short --junitxml=test-results/pytest-hardening.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-unit-results
          path: test-results/

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-evidence
          path: tests/evidence/

  # ── Stage 3: Frontend E2E Tests ──
  frontend-e2e:
    name: Frontend E2E
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: prism-ui/package-lock.json

      - name: Install dependencies
        run: cd prism-ui && npm ci

      - name: Install Playwright browsers
        run: cd prism-ui && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd prism-ui && npx playwright test
        env:
          PLAYWRIGHT_TRACE: on-first-retry
          PLAYWRIGHT_VIDEO: on-first-retry

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            prism-ui/playwright-report/
            prism-ui/tests/e2e/screenshots/

  # ── Stage 4: Integration Tests (PR only) ──
  integration:
    name: Integration Tests
    needs: [unit-tests, frontend-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -m integration --timeout=120 --tb=short --junitxml=test-results/pytest-integration.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-integration-results
          path: test-results/pytest-integration.xml

  # ── Stage 5: Live/Nightly Tests (scheduled only) ──
  live-nightly:
    name: Live Tests (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run live tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest -m live --timeout=300 --tb=short --junitxml=test-results/pytest-live.xml

      - name: Upload live test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-live-results
          path: test-results/pytest-live.xml

  # ── Stage 6: Visual Regression (PR only) ──
  visual-regression:
    name: Visual Regression
    needs: frontend-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: prism-ui/package-lock.json

      - name: Install dependencies
        run: cd prism-ui && npm ci

      - name: Install Playwright browsers
        run: cd prism-ui && npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: cd prism-ui && npx playwright test --project=visual

      - name: Upload snapshot diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: prism-ui/tests/e2e/snapshots/
